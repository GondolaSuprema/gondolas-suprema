name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile-flutter/**'
      - '.github/workflows/build-flutter-apk.yml'
  workflow_dispatch:

jobs:
  build-flutter-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate Flutter scaffold (android/, ios/, etc.)
        working-directory: mobile-flutter
        run: |
          flutter create --org com.gondolasuprema --project-name gondolas_suprema --platforms=android .

      - name: Install dependencies
        working-directory: mobile-flutter
        run: flutter pub get

      - name: Build debug APK
        working-directory: mobile-flutter
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gondolas-suprema-flutter-apk
          path: mobile-flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
